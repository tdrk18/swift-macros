name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-slim
    steps:
      - name: Ensure running on main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "This workflow must be run on main branch (current: ${{ github.ref }})" >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag -l '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="0.0.0"
          fi
          IFS='.' read -r major minor patch <<< "$latest"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $latest"
          echo "New version: $new"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.new }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.new }} already exists" >&2
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.new }}"
          git push origin "${{ steps.version.outputs.new }}"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new }}" \
            --title "${{ steps.version.outputs.new }}" \
            --generate-notes \
            --target main
